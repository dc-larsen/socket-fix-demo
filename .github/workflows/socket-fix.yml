name: Socket Fix

on:
  schedule:
    # Runs daily at midnight and noon UTC
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch: # Allow manual triggers for testing

permissions:
  contents: write
  pull-requests: write

jobs:
  socket-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Configure Socket CLI
        env:
          SOCKET_CLI_API_TOKEN: ${{ secrets.SOCKET_CLI_API_TOKEN }}
        run: |
          mkdir -p "$HOME/.local/share/socket/settings"
          CONFIG=$(echo -n "{\"defaultOrg\":\"david-s-github\",\"enforcedOrgs\":[\"346149\"],\"apiToken\":\"${SOCKET_CLI_API_TOKEN}\",\"apiBaseUrl\":\"\",\"apiProxy\":\"\"}" | base64 -w 0)
          echo "$CONFIG" > "$HOME/.local/share/socket/settings/config.json"

      - name: Run Socket Fix
        env:
          SOCKET_CLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOCKET_CLI_GIT_USER_EMAIL: socket-fix[bot]@users.noreply.github.com
          SOCKET_CLI_GIT_USER_NAME: socket-fix[bot]
          SOCKET_CLI_API_TOKEN: ${{ secrets.SOCKET_CLI_API_TOKEN }}
        run: npx @socketsecurity/cli fix --autopilot
